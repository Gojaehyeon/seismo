<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SEISMO · live MacBook seismograph</title>
<style>
  :root {
    --bg-0: #04060a;
    --bg-1: #080c14;
    --bg-2: #0d131e;
    --line: #14202e;
    --line-2: #1e2c3e;
    --fg: #d8e0ea;
    --dim: #5b6b7d;
    --dim-2: #3a4858;
    --amber: #ffb347;
    --cyan: #4be0ff;
    --green: #66d9a4;
    --red: #ff4f6a;
    --label: #7a8a9d;
    --x: #4be0ff;
    --y: #ffb347;
    --z: #66d9a4;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg-0);
    color: var(--fg);
    font-family: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, monospace;
    font-size: 12px;
    letter-spacing: 0.01em;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── Header ───────────────────────────────────────────────── */
  header {
    border-bottom: 1px solid var(--line-2);
    background: linear-gradient(180deg, #060a12 0%, #04060a 100%);
    padding: 10px 22px;
    display: flex;
    align-items: center;
    gap: 24px;
    min-height: 48px;
  }
  header .brand {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.22em;
    color: var(--amber);
  }
  header .brand::before { content: "◆ "; color: var(--amber); }
  header .meta {
    display: flex;
    gap: 22px;
    color: var(--dim);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  header .meta b {
    color: var(--fg);
    margin-left: 8px;
    font-weight: 500;
    letter-spacing: 0.02em;
    text-transform: none;
  }
  header .clock {
    margin-left: auto;
    font-size: 20px;
    color: var(--cyan);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
  }
  header .clock .z {
    font-size: 11px;
    color: var(--dim);
    margin-left: 6px;
    letter-spacing: 0.12em;
  }

  /* ─── Layout ───────────────────────────────────────────────── */
  main {
    display: grid;
    grid-template-columns: 1fr 300px;
    grid-template-rows: auto auto;
    gap: 12px;
    padding: 12px 14px;
  }
  .panel {
    background: var(--bg-1);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 10px 12px;
    position: relative;
  }
  .panel h2 {
    margin: 0 0 8px 0;
    font-size: 10px;
    font-weight: 600;
    color: var(--label);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .panel h2 .dim { color: var(--dim-2); font-weight: 400; letter-spacing: 0.08em; }
  .panel h2 .pill {
    margin-left: auto;
    font-size: 9px;
    color: var(--dim);
    border: 1px solid var(--line-2);
    padding: 1px 6px;
    border-radius: 2px;
    letter-spacing: 0.1em;
  }

  .heli   { grid-column: 1 / span 2; grid-row: 1; }
  .trace  { grid-column: 1;          grid-row: 2; }
  .sidebar{ grid-column: 2;          grid-row: 2; display: flex; flex-direction: column; gap: 12px; }

  canvas {
    display: block;
    width: 100%;
    background: var(--bg-0);
  }
  .heli canvas  { height: 260px; }
  .trace canvas { height: 340px; }

  /* ─── Readouts ─────────────────────────────────────────────── */
  .readout { display: grid; grid-template-columns: 1fr; gap: 2px; }
  .readout .row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px dashed var(--line);
  }
  .readout .row:last-child { border-bottom: none; }
  .readout .label {
    color: var(--label);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }
  .readout .val { color: var(--fg); font-size: 13px; font-variant-numeric: tabular-nums; }
  .readout .val.big  { font-size: 22px; color: var(--amber); }
  .readout .val.unit { color: var(--dim); font-size: 10px; margin-left: 4px; }
  .readout .val.acc  { color: var(--cyan); }
  .readout .val.warn { color: var(--red); }
  .readout .sub { color: var(--dim); font-size: 10px; text-align: right; padding-bottom: 6px; }

  /* ─── Event log ────────────────────────────────────────────── */
  .events { max-height: 200px; overflow-y: auto; padding-right: 4px; }
  .events::-webkit-scrollbar { width: 6px; }
  .events::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 3px; }
  .events .item {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    font-size: 11px;
    font-variant-numeric: tabular-nums;
    border-bottom: 1px dotted var(--line);
    color: var(--red);
  }
  .events .item span.t { color: var(--dim); }
  .events .empty {
    color: var(--dim);
    padding: 10px 0;
    text-align: center;
    font-style: italic;
  }

  /* ─── Status indicator ─────────────────────────────────────── */
  .dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    margin-right: 6px;
    vertical-align: middle;
  }
  .dot.alert { background: var(--red); box-shadow: 0 0 10px var(--red); animation: pulse 0.8s infinite; }
  .dot.off   { background: var(--dim-2); box-shadow: none; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  button {
    background: transparent;
    color: var(--dim);
    border: 1px solid var(--line-2);
    padding: 4px 10px;
    border-radius: 2px;
    font-family: inherit;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    cursor: pointer;
  }
  button:hover { color: var(--amber); border-color: var(--amber); }

  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; }
    .heli, .trace, .sidebar { grid-column: 1; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">SEISMO</div>
  <div class="meta">
    <span>STA <b id="m-host">—</b></span>
    <span>UP <b id="m-uptime">00:00:00</b></span>
    <span>SAMPLES <b id="m-samples">0</b></span>
    <span><span class="dot" id="dot"></span><b id="m-status">connecting…</b></span>
  </div>
  <div class="clock">
    <span id="m-clock">--:--:--</span><span class="z">UTC</span>
  </div>
</header>

<main>
  <section class="panel heli">
    <h2>
      HELICORDER
      <span class="dim">10 rows × 60 s · last 10 minutes</span>
      <span class="pill">|mag|</span>
    </h2>
    <canvas id="heli"></canvas>
  </section>

  <section class="panel trace">
    <h2>
      WAVEFORM
      <span class="dim">3-axis · 60 s · high-pass 0.5 Hz</span>
      <span class="pill">±0.5 g</span>
    </h2>
    <canvas id="trace"></canvas>
  </section>

  <aside class="sidebar">
    <section class="panel">
      <h2>PEAK GROUND ACCEL <span class="pill">since start</span></h2>
      <div class="readout">
        <div class="row" style="border-bottom:none; padding-bottom:0">
          <span class="val big" id="r-pga">0.0000</span>
          <span class="val unit">g</span>
        </div>
        <div class="sub"><span id="r-pga-gal">—</span> gal · <span id="r-pga-ms2">—</span> m/s²</div>
        <div class="row">
          <span class="label">RMS / 10 min</span>
          <span class="val" id="r-rms">—</span>
        </div>
        <div class="row">
          <span class="label">STA/LTA</span>
          <span class="val acc" id="r-stalta">—</span>
        </div>
        <div class="row">
          <span class="label">TRIGGER @</span>
          <span class="val" id="r-trig">—</span>
        </div>
        <div class="row">
          <span class="label">RATE</span>
          <span class="val" id="r-rate">— Hz</span>
        </div>
      </div>
      <button style="margin-top:8px" onclick="resetPGA()">reset peak</button>
    </section>

    <section class="panel" style="flex:1">
      <h2>EVENT LOG <span class="pill"><span id="r-evcount">0</span></span></h2>
      <div class="events" id="ev-list"><div class="empty">no events</div></div>
    </section>
  </aside>
</main>

<script>
"use strict";

// ─── Canvases ─────────────────────────────────────────────────
const elHeli = document.getElementById('heli');
const ctxHeli = elHeli.getContext('2d');
const elTrace = document.getElementById('trace');
const ctxTrace = elTrace.getContext('2d');

function fit(c) {
  const r = c.getBoundingClientRect();
  c.width  = Math.floor(r.width  * devicePixelRatio);
  c.height = Math.floor(r.height * devicePixelRatio);
}
function fitAll() { fit(elHeli); fit(elTrace); }
window.addEventListener('resize', fitAll);
fitAll();

// ─── State ────────────────────────────────────────────────────
let latest = null;

// ─── Helpers ──────────────────────────────────────────────────
function pad(n) { return String(n).padStart(2, '0'); }
function fmtHMS(sec) {
  sec = Math.max(0, Math.floor(sec));
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  return `${pad(h)}:${pad(m)}:${pad(s)}`;
}
function fmtUTC(d) {
  return `${pad(d.getUTCHours())}:${pad(d.getUTCMinutes())}:${pad(d.getUTCSeconds())}`;
}
function fmtG(v, digits=4) { return (v >= 0 ? ' ' : '') + v.toFixed(digits); }

// ─── Helicorder ──────────────────────────────────────────────
function drawHelicorder(samples, snap) {
  const W = elHeli.width, H = elHeli.height;
  ctxHeli.clearRect(0, 0, W, H);
  ctxHeli.fillStyle = '#04060a';
  ctxHeli.fillRect(0, 0, W, H);
  if (!samples || samples.length < 2) return;

  const ROWS = 10;
  const ROW_SEC = 60;
  const TOTAL_SEC = ROWS * ROW_SEC;

  const tEnd = samples[samples.length - 1].t;
  const tStart = tEnd - TOTAL_SEC;
  const rowH = H / ROWS;
  const labelW = 70 * devicePixelRatio;
  const plotW = W - labelW - (8 * devicePixelRatio);

  // auto-scale
  let peak = 0.01;
  samples.forEach(s => { if (s.t >= tStart && s.m > peak) peak = s.m; });

  // grid
  ctxHeli.strokeStyle = 'rgba(30, 44, 62, 0.45)';
  ctxHeli.lineWidth = 1;
  ctxHeli.beginPath();
  for (let i = 0; i <= ROWS; i++) {
    const y = (i * rowH) | 0;
    ctxHeli.moveTo(labelW, y + 0.5); ctxHeli.lineTo(W, y + 0.5);
  }
  for (let i = 0; i <= 6; i++) {
    const x = labelW + ((plotW * i / 6) | 0);
    ctxHeli.moveTo(x + 0.5, 0); ctxHeli.lineTo(x + 0.5, H);
  }
  ctxHeli.stroke();

  // time conversion (server "seconds since start" → wall clock)
  const startUnix = (snap.stats && snap.stats.start_unix) || (Date.now() / 1000);
  const tToWall = (t) => new Date((startUnix + t) * 1000);

  for (let row = 0; row < ROWS; row++) {
    const rowTStart = tStart + row * ROW_SEC;
    const rowTEnd = rowTStart + ROW_SEC;
    const yMid = row * rowH + rowH / 2;

    // time label
    const wall = tToWall(rowTStart);
    const label = `${pad(wall.getUTCHours())}:${pad(wall.getUTCMinutes())}`;
    ctxHeli.fillStyle = '#5b6b7d';
    ctxHeli.font = `${11 * devicePixelRatio}px ui-monospace, monospace`;
    ctxHeli.textBaseline = 'middle';
    ctxHeli.fillText(label, 8 * devicePixelRatio, yMid);

    const rowPts = samples.filter(s => s.t >= rowTStart && s.t < rowTEnd);
    if (rowPts.length < 2) continue;

    // trace
    ctxHeli.strokeStyle = '#ffb347';
    ctxHeli.lineWidth = 1 * devicePixelRatio;
    ctxHeli.beginPath();
    rowPts.forEach((s, i) => {
      const x = labelW + ((s.t - rowTStart) / ROW_SEC) * plotW;
      const amp = (s.m / peak) * (rowH * 0.48);
      const sign = i % 2 === 0 ? 1 : -1;
      const y = yMid - sign * amp;
      if (i === 0) ctxHeli.moveTo(x, y);
      else ctxHeli.lineTo(x, y);
    });
    ctxHeli.stroke();

    // event markers on this row
    const quakes = (snap.quakes) || [];
    quakes.forEach(q => {
      if (q.t < rowTStart || q.t >= rowTEnd) return;
      const x = labelW + ((q.t - rowTStart) / ROW_SEC) * plotW;
      ctxHeli.strokeStyle = '#ff4f6a';
      ctxHeli.lineWidth = 2 * devicePixelRatio;
      ctxHeli.beginPath();
      ctxHeli.moveTo(x, row * rowH + 2);
      ctxHeli.lineTo(x, (row + 1) * rowH - 2);
      ctxHeli.stroke();
    });
  }

  // scale label
  ctxHeli.fillStyle = '#5b6b7d';
  ctxHeli.font = `${10 * devicePixelRatio}px ui-monospace`;
  ctxHeli.textBaseline = 'top';
  ctxHeli.fillText(`peak ${peak.toFixed(3)}g`, W - (90 * devicePixelRatio), 6 * devicePixelRatio);
}

// ─── 3-axis waveform ─────────────────────────────────────────
function drawGridLines(ctx, W, H, cols, rows) {
  ctx.strokeStyle = 'rgba(30, 44, 62, 0.55)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let i = 1; i < cols; i++) {
    const x = (W * i / cols) | 0;
    ctx.moveTo(x + 0.5, 0); ctx.lineTo(x + 0.5, H);
  }
  for (let i = 1; i < rows; i++) {
    const y = (H * i / rows) | 0;
    ctx.moveTo(0, y + 0.5); ctx.lineTo(W, y + 0.5);
  }
  ctx.stroke();
}

function drawTrace(samples) {
  const W = elTrace.width, H = elTrace.height;
  ctxTrace.clearRect(0, 0, W, H);
  ctxTrace.fillStyle = '#04060a';
  ctxTrace.fillRect(0, 0, W, H);
  drawGridLines(ctxTrace, W, H, 6, 6);

  if (!samples || samples.length < 2) return;

  const tEnd = samples[samples.length - 1].t;
  const win = samples.filter(s => s.t >= tEnd - 60);
  if (win.length < 2) return;

  const tracks = [
    { key: 'hx', color: '#4be0ff', label: 'X' },
    { key: 'hy', color: '#ffb347', label: 'Y' },
    { key: 'hz', color: '#66d9a4', label: 'Z' },
  ];
  const rowH = H / 3;
  const scale = (rowH * 0.45) / 0.5;

  tracks.forEach((tr, i) => {
    const yMid = i * rowH + rowH / 2;

    ctxTrace.strokeStyle = 'rgba(30, 44, 62, 0.9)';
    ctxTrace.lineWidth = 1;
    ctxTrace.beginPath();
    ctxTrace.moveTo(0, yMid); ctxTrace.lineTo(W, yMid);
    ctxTrace.stroke();

    ctxTrace.strokeStyle = tr.color;
    ctxTrace.lineWidth = 1.2 * devicePixelRatio;
    ctxTrace.beginPath();
    win.forEach((s, k) => {
      const x = (k / (win.length - 1)) * W;
      const y = yMid - s[tr.key] * scale;
      if (k === 0) ctxTrace.moveTo(x, y);
      else ctxTrace.lineTo(x, y);
    });
    ctxTrace.stroke();

    ctxTrace.fillStyle = tr.color;
    ctxTrace.font = `bold ${12 * devicePixelRatio}px ui-monospace`;
    ctxTrace.textBaseline = 'top';
    ctxTrace.fillText(tr.label, 8 * devicePixelRatio, i * rowH + 6 * devicePixelRatio);
  });

  // time axis labels
  ctxTrace.fillStyle = '#5b6b7d';
  ctxTrace.font = `${10 * devicePixelRatio}px ui-monospace`;
  ctxTrace.textBaseline = 'bottom';
  for (let s = 0; s <= 60; s += 10) {
    const x = W - (s / 60) * W;
    ctxTrace.fillText(`-${s}s`, x + 4 * devicePixelRatio, H - 4 * devicePixelRatio);
  }
}

// ─── Readouts ─────────────────────────────────────────────────
function updateReadouts(snap) {
  const s = snap.stats || {};
  document.getElementById('r-pga').textContent     = fmtG(s.pga || 0, 4);
  document.getElementById('r-pga-gal').textContent = (s.pga_gal || 0).toFixed(3);
  document.getElementById('r-pga-ms2').textContent = (s.pga_ms2 || 0).toFixed(4);
  document.getElementById('r-rms').textContent     = fmtG(s.rms || 0, 5) + ' g';
  const ratio = s.sta_lta || 0;
  const trig  = s.trigger || 4;
  const rEl = document.getElementById('r-stalta');
  rEl.textContent = ratio.toFixed(2);
  rEl.classList.toggle('warn', ratio > trig);
  document.getElementById('r-trig').textContent = trig.toFixed(1) + '×';
  document.getElementById('r-rate').textContent = (s.rate_hz || 0) + ' Hz';

  document.getElementById('m-host').textContent = s.host || 'local';
  document.getElementById('m-uptime').textContent = fmtHMS(s.uptime_s || 0);
  document.getElementById('m-samples').textContent =
    (s.filled || 0).toLocaleString();

  const dot = document.getElementById('dot');
  const statusEl = document.getElementById('m-status');
  if (ratio > trig) {
    dot.className = 'dot alert';
    statusEl.textContent = 'EVENT';
  } else {
    dot.className = 'dot';
    statusEl.textContent = 'LIVE';
  }
}

function renderEvents(snap) {
  const list = document.getElementById('ev-list');
  const evs = (snap.quakes || []).slice().reverse();
  document.getElementById('r-evcount').textContent = (snap.quakes || []).length;
  if (evs.length === 0) {
    list.innerHTML = '<div class="empty">no events</div>';
    return;
  }
  const s = snap.stats || {};
  const startUnix = s.start_unix || (Date.now() / 1000);
  list.innerHTML = evs.map(q => {
    const wall = new Date((startUnix + q.t) * 1000);
    const hms = fmtUTC(wall);
    return `<div class="item">
      <span class="t">${hms}</span>
      <span>${q.peak.toFixed(3)}g · ${q.ratio.toFixed(1)}×</span>
    </div>`;
  }).join('');
}

// ─── Main render loop ────────────────────────────────────────
function render() {
  if (latest) {
    drawHelicorder(latest.samples || [], latest);
    drawTrace(latest.samples || []);
    updateReadouts(latest);
    renderEvents(latest);
  }
  document.getElementById('m-clock').textContent = fmtUTC(new Date());
  requestAnimationFrame(render);
}
requestAnimationFrame(render);

// ─── Stream ──────────────────────────────────────────────────
// /stream already decimates, but we want the full 10-minute window, so we
// also poll /state?decim=60 which gives us 1000 points (enough for helicorder).
setInterval(async () => {
  try {
    const r = await fetch('/state?decim=60');
    if (r.ok) latest = await r.json();
  } catch {}
}, 500);

async function resetPGA() {
  try { await fetch('/reset', { method: 'POST' }); } catch {}
}
</script>
</body>
</html>
